# /etc/nginx/sites-available/uxsite
# Activated with:  ln -s /etc/nginx/sites-available/uxsite /etc/nginx/sites-enabled/
# certbot --nginx -d ux.erplora.com  rewrites this file to add the TLS block
# and the 80 -> 443 redirect.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ux.erplora.com;

    # ACME challenge for Let's Encrypt renewal stays on :80
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Datastar SSE streams. Disable buffering so events are flushed live.
    location ~ ^/(stream|ws/stream) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 24h;
    }

    access_log /var/log/nginx/uxsite.access.log;
    error_log  /var/log/nginx/uxsite.error.log;
}
