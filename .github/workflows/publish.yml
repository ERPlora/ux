name: Release

# Two tag conventions, two products in one repo:
#   v*.*.*           → CSS lib release: build, run tests, deploy uxsite to Lightsail
#   pyjinja-v*.*.*   → ux-jinja PyPI release: build wheel + sdist, upload via OIDC
#
# `workflow_dispatch` allows running the whole thing manually against any ref.

on:
  push:
    tags:
      - "v*.*.*"
      - "pyjinja-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag or branch to deploy (defaults to current)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write   # required for OIDC ↔ AWS

env:
  AWS_REGION: eu-west-1
  AWS_ROLE_ARN: arn:aws:iam::363427305647:role/github-actions-deploy
  SSH_SECRET_NAME: erplora/uxsite/ssh-key
  LIGHTSAIL_INSTANCE: uxsite

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_macros.py -v --tb=short

  publish-pypi:
    name: Publish ux-jinja to PyPI
    needs: test
    runs-on: ubuntu-latest
    # Only on pyjinja-v* tags. CSS-lib releases (v*.*.*) skip this.
    if: startsWith(github.ref, 'refs/tags/pyjinja-v')
    # Trusted Publisher (OIDC) — no token, no secret. PyPI verifies
    # the workflow identity via the `pypi` environment configured at
    # https://pypi.org/manage/account/publishing/ (pending publisher
    # for project ux-jinja, repo ERPlora/ux, workflow publish.yml,
    # environment pypi).
    environment:
      name: pypi
      url: https://pypi.org/p/ux-jinja
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy-lightsail:
    name: Deploy uxsite to Lightsail
    needs: test
    # Only on CSS-lib tags (v*.*.*), not on pyjinja-v* PyPI tags.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Lightsail public IP
        id: lightsail
        run: |
          IP=$(aws lightsail get-static-ip \
                --static-ip-name uxsite-ip \
                --query 'staticIp.ipAddress' \
                --output text)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Fetch SSH private key from Secrets Manager
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # Capture into a variable first so a CLI failure aborts the step
          # instead of writing the error message into the key file.
          SSH_KEY=$(aws secretsmanager get-secret-value \
            --secret-id "$SSH_SECRET_NAME" \
            --query 'SecretString' \
            --output text)
          if [ -z "$SSH_KEY" ] || ! echo "$SSH_KEY" | head -1 | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "Secret $SSH_SECRET_NAME is empty or not a private key" >&2
            exit 1
          fi
          umask 077
          printf '%s\n' "$SSH_KEY" > ~/.ssh/uxsite_deploy
          chmod 600 ~/.ssh/uxsite_deploy
          # Scan host keys; skip silently on connection issues so the
          # subsequent ssh step prints a clearer error.
          ssh-keyscan -T 10 -t ed25519,ecdsa,rsa \
            "${{ steps.lightsail.outputs.ip }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH (git fetch + smart pip + supervisorctl restart)
        env:
          DEPLOY_HOST: ${{ steps.lightsail.outputs.ip }}
          DEPLOY_REF: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Connect as `ubuntu` (the default Lightsail user, owner of the
          # key pair). `ubuntu` is already in sudoers and re-execs the
          # deploy as the unprivileged `deploy` user that owns /srv/uxsite.
          # The deploy is skipping `pip install` unless pyproject.toml
          # actually changed since the previous tag — Hotframe's
          # dev-extras require ~150 MB of compile output and OOM-kill
          # supervisor on the 512 MB Nano plan if reinstalled blindly.
          ssh -i ~/.ssh/uxsite_deploy -o StrictHostKeyChecking=accept-new \
              "ubuntu@$DEPLOY_HOST" sudo -u deploy -H bash -s <<EOSSH
            set -euo pipefail
            cd /srv/uxsite
            git fetch --tags --prune origin
            PREV=\$(git rev-parse HEAD)
            # If DEPLOY_REF is a branch name, resolve it via origin/ to
            # pick up the most recent push. If it's a tag, use it as-is.
            REF="$DEPLOY_REF"
            if git show-ref --verify --quiet "refs/tags/\$REF"; then
              TARGET="\$REF"
            else
              TARGET="origin/\$REF"
            fi
            git checkout --detach "\$TARGET"
            git reset --hard "\$TARGET"
            if git diff --name-only "\$PREV" HEAD | grep -q '^pyproject.toml\$'; then
              echo "pyproject.toml changed; reinstalling dependencies"
              .venv/bin/pip install --quiet -e '.[dev]' gunicorn
            else
              # Reinstall just ux-jinja in editable mode is a no-op
              # because we already use -e on the same checkout.
              echo "pyproject.toml unchanged; skipping pip install"
            fi
          EOSSH
          # Restart the supervisor program. `ubuntu` has the sudo NOPASSWD
          # rule installed by setup.sh. Use `start` first in case the
          # process is currently down (e.g. previous OOM), then restart.
          ssh -i ~/.ssh/uxsite_deploy "ubuntu@$DEPLOY_HOST" \
              "sudo /usr/bin/supervisorctl status uxsite >/dev/null 2>&1 \
                 && sudo /usr/bin/supervisorctl restart uxsite \
                 || sudo /usr/bin/supervisorctl start uxsite"
          sleep 3
          ssh -i ~/.ssh/uxsite_deploy "ubuntu@$DEPLOY_HOST" \
              "curl -fsS -o /dev/null -w 'HTTP %{http_code} TTFB %{time_starttransfer}s\n' http://127.0.0.1:8000/"

      - name: Smoke test public URL
        run: |
          curl -fsS -o /dev/null -w 'public HTTP %{http_code}\n' https://ux.erplora.com/
