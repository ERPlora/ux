<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ERPlora UX{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css" />
  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@main/bundles/datastar.js" nonce="{{ csp_nonce }}"></script>
  <style>
    /* Layout-only styling for the docs shell. Component CSS comes from the @erplora/ux bundle. */
    body { margin: 0; font-family: var(--ux-font-body, system-ui, sans-serif); background: var(--ux-bg, #fafafa); color: var(--ux-ink, #111); }
    h1, h2, h3, h4 { color: var(--ux-ink, #111); }
    .docs-shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .docs-sidebar { background: var(--ux-bg-2, #fff); border-right: 1px solid var(--ux-line, #e5e5e5); padding: 1.25rem 1rem; }
    .docs-sidebar h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--ux-ink-3, #666); margin: 1.25rem 0 .5rem; }
    .docs-sidebar a { display: block; padding: .35rem .5rem; border-radius: .375rem; color: var(--ux-ink, #111); text-decoration: none; font-size: .9rem; }
    .docs-sidebar a:hover { background: var(--ux-bg-3, #f1f1f1); }
    .docs-main { padding: 2rem 2.5rem; max-width: 1080px; }
    .docs-main h1 { font-size: 1.75rem; margin: 0 0 .5rem; font-weight: 700; }
    .docs-main h2 { font-size: 1.25rem; margin: 1.75rem 0 .75rem; font-weight: 600; }
    .docs-main p { color: var(--ux-ink-2, #444); }
    .docs-brand { font-weight: 700; font-size: 1.05rem; }
    .docs-brand a { color: var(--ux-ink, #111); text-decoration: none; }
    pre { background: #0b1020; color: #e2e8f0; padding: 1rem; border-radius: .5rem; overflow: auto; font-size: .82rem; }
    code { font-family: "JetBrains Mono", ui-monospace, monospace; }
    .preview-frame { border: 1px solid var(--ux-line, #e5e5e5); border-radius: .5rem; padding: 1.5rem; background: var(--ux-bg-2, #fff); }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div id="toast-container"></div>
  <div class="docs-shell">
    <aside class="docs-sidebar">
      <p class="docs-brand"><a href="/">ERPlora UX</a></p>
      <h2>Site</h2>
      <a href="/">Home</a>
      <a href="/c">Components</a>
      <a href="/p">Pages</a>
      <h2>Components</h2>
      {% for name in component_names %}
        <a href="/c/{{ name }}">{{ name }}</a>
      {% endfor %}
      <h2>Pages</h2>
      {% for name in page_names %}
        <a href="/p/{{ name }}">{{ name }}</a>
      {% endfor %}
    </aside>
    <main class="docs-main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
