{% extends "_base.html" %}

{% block title %}Components — ERPlora UX{% endblock %}

{% block content %}
<section class="ux-stack">
  <header>
    <h1>Components</h1>
    <p>Each macro is a thin wrapper around the matching CSS component in the @erplora/ux library.</p>
  </header>

  <ul class="ux-list">
    {% for name in components %}
      <li class="ux-list__item">
        <a href="/c/{{ name }}"><strong>{{ name }}</strong></a>
      </li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
