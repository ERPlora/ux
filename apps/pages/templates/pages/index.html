{% extends "_base.html" %}

{% block title %}Pages — ERPlora UX{% endblock %}

{% block content %}
<section class="ux-stack">
  <header>
    <h1>Pages</h1>
    <p>Ready-made templates that compose the macros into full views.</p>
  </header>

  <ul class="ux-list">
    {% for name in pages %}
      <li class="ux-list__item">
        <a href="/p/{{ name }}"><strong>{{ name }}</strong></a>
      </li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
