{% extends "_base.html" %}

{% block title %}{{ name }} — ERPlora UX pages{% endblock %}

{% block content %}
<section class="ux-stack">
  <header>
    <p><a href="/p">&larr; Pages</a></p>
    <h1>{{ name }}</h1>
    <p>Live render of <code>{{ page_template }}</code>.</p>
  </header>

  <section>
    <h2>Preview</h2>
    <div class="preview-frame">
      {% include page_template with context %}
    </div>
  </section>

  <section>
    <h2>Source</h2>
    <pre><code>{{ source }}</code></pre>
  </section>
</section>
{% endblock %}
