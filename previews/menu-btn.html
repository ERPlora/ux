<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Menu button</title>
<link rel="stylesheet" href="../lib/css/ux.css"/>
<style>
  body { padding: 40px 24px; background: var(--ux-bg); }
  .row { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; padding: 28px; background: var(--ux-bg-2); border: 1px solid var(--ux-line); border-radius: 14px; margin-bottom: 18px; }
  .lab { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin-right: 12px; }
  code { font-family: var(--ux-font-mono); font-size: 11.5px; color: var(--ux-ink-2); padding: 2px 7px; background: var(--ux-bg-3); border-radius: 4px; }
  p { color: var(--ux-ink-3); font-size: 13px; max-width: 540px; }
</style>
</head><body>

<p>Botón hamburger con animación a X. Estado controlado por <code>aria-expanded="true"</code> o <code>data-state="open"</code>. Click para alternar.</p>

<div class="row">
  <span class="lab">Cerrado</span>
  <button class="ux-menu-btn" aria-expanded="false" aria-label="Menú" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true')">
    <span class="ux-menu-btn-lines"><span class="ux-menu-btn-line"></span><span class="ux-menu-btn-line"></span><span class="ux-menu-btn-line"></span></span>
  </button>
  <span class="lab">Abierto</span>
  <button class="ux-menu-btn" aria-expanded="true" aria-label="Cerrar" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true')">
    <span class="ux-menu-btn-lines"><span class="ux-menu-btn-line"></span><span class="ux-menu-btn-line"></span><span class="ux-menu-btn-line"></span></span>
  </button>
  <span class="lab">Click para alternar</span>
  <button class="ux-menu-btn" aria-expanded="false" aria-label="Menú" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true')">
    <span class="ux-menu-btn-lines"><span class="ux-menu-btn-line"></span><span class="ux-menu-btn-line"></span><span class="ux-menu-btn-line"></span></span>
  </button>
</div>

<div class="row">
  <span class="lab">Solo mobile</span>
  <code>.ux-menu-btn--mobile-only</code>
  <span style="color:var(--ux-ink-3);font-size:13px;">Se oculta en ≥768px. Aquí estará oculto en desktop, visible en mobile.</span>
  <button class="ux-menu-btn ux-menu-btn--mobile-only" aria-expanded="false" aria-label="Menú">
    <span class="ux-menu-btn-lines"><span class="ux-menu-btn-line"></span><span class="ux-menu-btn-line"></span><span class="ux-menu-btn-line"></span></span>
  </button>
</div>

</body></html>
