<!doctype html>
<html lang="es" data-theme="erplora">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>403 · Acceso denegado · ERPlora Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@main/bundles/datastar.js"></script>
<style>
  body { background: var(--ux-bg); margin: 0; }

  /* TODO UX: ux-error-page composite (full-screen error layout) doesn't exist as a single block — composing locally with ux-card + ux-empty fragments */
  .err-page {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: var(--ux-space-5);
    position: relative;
    overflow: hidden;
  }
  .err-page::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 70% 10%, color-mix(in oklch, var(--ux-warn) 15%, transparent) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 20% 90%, color-mix(in oklch, var(--ux-brand) 10%, transparent) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .err-page::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(color-mix(in oklch, var(--ux-ink) 4%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in oklch, var(--ux-ink) 4%, transparent) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none; z-index: 0;
  }
  .err-card {
    position: relative; z-index: 1;
    max-width: 520px; width: 100%;
    text-align: center;
  }
  .err-illu {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: color-mix(in oklch, var(--ux-warn) 14%, var(--ux-bg-2));
    color: var(--ux-warn);
    display: grid; place-items: center;
    margin: 0 auto var(--ux-space-4);
  }
  .err-code {
    font-family: var(--ux-font-display);
    font-size: clamp(72px, 14vw, 120px);
    font-weight: 800;
    color: var(--ux-warn);
    line-height: 1;
    letter-spacing: var(--ux-tracking-tighter);
    margin: 0 0 var(--ux-space-3);
  }
  .err-title {
    font-family: var(--ux-font-display);
    font-size: var(--ux-text-2xl);
    font-weight: 700;
    color: var(--ux-ink);
    margin: 0 0 var(--ux-space-2);
    letter-spacing: var(--ux-tracking-tight);
  }
  .err-msg {
    color: var(--ux-ink-2);
    line-height: var(--ux-leading-relaxed);
    margin: 0 0 var(--ux-space-5);
  }
  .err-actions {
    display: inline-flex; gap: var(--ux-space-2); flex-wrap: wrap;
    justify-content: center;
  }
  .err-meta {
    margin-top: var(--ux-space-5);
    font-family: var(--ux-font-mono);
    font-size: 11px;
    color: var(--ux-ink-3);
  }
</style>
</head>
<body>
  <main class="err-page">
    <div class="err-card">
      <div class="err-illu" aria-hidden="true">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1 class="err-code">403</h1>
      <h2 class="err-title">Acceso denegado</h2>
      <p class="err-msg">
        No tienes permiso para acceder a esta página. Si crees que es un error,
        contacta con tu administrador o vuelve al inicio.
      </p>
      <div class="err-actions">
        <a href="/" class="ux-btn ux-btn--primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12 12 3l9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/>
          </svg>
          Volver al inicio
        </a>
        <button class="ux-btn ux-btn--ghost"
                data-on-click="window.location.href = '/logout'">
          Cerrar sesión
        </button>
      </div>
      <div class="err-meta">err.auth.forbidden · req-9f4a21e</div>
    </div>
  </main>
</body>
</html>
