<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stats</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  h4 { font-family: var(--ux-font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin: 0 0 10px; }
  section { margin-bottom: 18px; }
</style></head><body>

<section>
  <h4>Stats · fila comparativa</h4>
  <div class="ux-stats">
    <div class="ux-stat">
      <div class="ux-stat__label">Pedidos</div>
      <div class="ux-stat__value">1.284</div>
      <div class="ux-stat__delta ux-stat__delta--up">+6,2%</div>
    </div>
    <div class="ux-stat">
      <div class="ux-stat__label">Facturación</div>
      <div class="ux-stat__value">€48.210</div>
      <div class="ux-stat__delta ux-stat__delta--up">+9,1%</div>
    </div>
    <div class="ux-stat">
      <div class="ux-stat__label">Devoluciones</div>
      <div class="ux-stat__value">12</div>
      <div class="ux-stat__delta ux-stat__delta--down">−4 vs mes</div>
    </div>
    <div class="ux-stat">
      <div class="ux-stat__label">Clientes nuevos</div>
      <div class="ux-stat__value">38</div>
      <div class="ux-stat__delta">igual que mes</div>
    </div>
  </div>
</section>

<section>
  <h4>Stats · 3 columnas</h4>
  <div class="ux-stats">
    <div class="ux-stat">
      <div class="ux-stat__label">Stock crítico</div>
      <div class="ux-stat__value">7 SKU</div>
    </div>
    <div class="ux-stat">
      <div class="ux-stat__label">En tránsito</div>
      <div class="ux-stat__value">23</div>
    </div>
    <div class="ux-stat">
      <div class="ux-stat__label">Almacenes</div>
      <div class="ux-stat__value">4</div>
    </div>
  </div>
</section>

</body></html>
