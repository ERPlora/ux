<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Button</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  section { margin-bottom: 26px; }
  h4 { font-family: var(--ux-font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin-bottom: 10px; }
  .grp { background: var(--ux-bg-2); border: 1px solid var(--ux-line); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
</style></head><body>

<section class="grp">
  <h4>Variantes</h4>
  <div class="ux-flex ux-wrap ux-gap-2 ux-items-center">
    <button class="ux-btn ux-btn--primary">Continuar</button>
    <button class="ux-btn ux-btn--secondary">Secundario</button>
    <button class="ux-btn ux-btn--outline">Outline</button>
    <button class="ux-btn ux-btn--ghost">Ghost</button>
    <button class="ux-btn ux-btn--danger">Eliminar</button>
    <button class="ux-btn ux-btn--link">Aprender más →</button>
  </div>
</section>

<section class="grp">
  <h4>Tamaños</h4>
  <div class="ux-flex ux-wrap ux-gap-2 ux-items-center">
    <button class="ux-btn ux-btn--primary ux-btn--sm">Small</button>
    <button class="ux-btn ux-btn--primary">Medium</button>
    <button class="ux-btn ux-btn--primary ux-btn--lg">Large</button>
  </div>
</section>

<section class="grp">
  <h4>Con icono</h4>
  <div class="ux-flex ux-wrap ux-gap-2 ux-items-center">
    <button class="ux-btn ux-btn--primary"><svg class="ux-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg> Nuevo ticket</button>
    <button class="ux-btn ux-btn--secondary"><svg class="ux-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Exportar</button>
    <button class="ux-btn ux-btn--ghost ux-btn--icon" aria-label="Más"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
  </div>
</section>

<section class="grp">
  <h4>Button group · segmented</h4>
  <div class="ux-flex ux-wrap ux-gap-2 ux-items-center">
    <div class="ux-btn-group">
      <button data-active="true">Hoy</button>
      <button>7 días</button>
      <button>30 días</button>
      <button>90 días</button>
    </div>
    <div class="ux-btn-group">
      <button data-active="true">Lista</button>
      <button>Cuadrícula</button>
    </div>
  </div>
</section>

<section class="grp">
  <h4>Estados</h4>
  <div class="ux-flex ux-wrap ux-gap-2 ux-items-center">
    <button class="ux-btn ux-btn--primary" disabled>Deshabilitado</button>
    <button class="ux-btn ux-btn--block ux-btn--primary" style="max-width:240px;">Bloque · ancho completo</button>
  </div>
</section>

</body></html>
