<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Avatar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  h4 { font-family: var(--ux-font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin-bottom: 10px; }
  .grp { background: var(--ux-bg-2); border: 1px solid var(--ux-line); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
</style></head><body>

<section class="grp">
  <h4>Tamaños</h4>
  <div class="row">
    <span class="ux-avatar ux-avatar--xs">JC</span>
    <span class="ux-avatar ux-avatar--sm">JC</span>
    <span class="ux-avatar">JC</span>
    <span class="ux-avatar ux-avatar--lg">JC</span>
    <span class="ux-avatar ux-avatar--xl">JC</span>
  </div>
</section>

<section class="grp">
  <h4>Variantes</h4>
  <div class="row">
    <span class="ux-avatar">MR</span>
    <span class="ux-avatar ux-avatar--brand">EX</span>
    <span class="ux-avatar"><img src="https://i.pravatar.cc/64?img=11" alt=""/></span>
    <span class="ux-avatar ux-avatar--lg"><img src="https://i.pravatar.cc/64?img=22" alt=""/></span>
  </div>
</section>

<section class="grp">
  <h4>Stack</h4>
  <div class="row">
    <span class="ux-avatar-stack">
      <span class="ux-avatar"><img src="https://i.pravatar.cc/64?img=1" alt=""/></span>
      <span class="ux-avatar"><img src="https://i.pravatar.cc/64?img=2" alt=""/></span>
      <span class="ux-avatar"><img src="https://i.pravatar.cc/64?img=3" alt=""/></span>
      <span class="ux-avatar">+4</span>
    </span>
  </div>
</section>

<section class="grp">
  <h4>Icon button</h4>
  <div class="row">
    <button class="ux-icon-btn" aria-label="Buscar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></button>
    <button class="ux-icon-btn" aria-pressed="true" aria-label="Favorito"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="m12 21-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.18L12 21z"/></svg></button>
    <button class="ux-icon-btn ux-icon-btn--lg" aria-label="Más"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
  </div>
</section>

<section class="grp">
  <h4>Divider</h4>
  <div style="display:flex;align-items:center;height:50px;">
    <span>Izquierda</span>
    <span class="ux-divider ux-divider--vert"></span>
    <span>Derecha</span>
  </div>
  <hr class="ux-divider"/>
</section>

</body></html>
