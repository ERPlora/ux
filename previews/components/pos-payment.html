<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>POS · Pago</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  .frame { background: var(--ux-bg-2); border: 1px solid var(--ux-line); border-radius: 18px; padding: 28px 24px; max-width: 480px; margin: 0 auto; }
  h2 { font-family: var(--ux-font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.03em; margin: 0 0 4px; }
  .lede { font-size: 13px; color: var(--ux-ink-3); margin: 0 0 20px; }
  .total-display {
    background: var(--ux-bg);
    border: 1px solid var(--ux-line);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .total-display__label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); }
  .total-display__value { font-family: var(--ux-font-display); font-size: 44px; font-weight: 600; letter-spacing: -0.04em; color: var(--ux-ink); font-variant-numeric: tabular-nums; line-height: 1.05; margin-top: 6px; }
  h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin: 0 0 10px; font-weight: 500; }
</style></head><body>

<div class="frame">
  <h2>Cobrar pedido</h2>
  <p class="lede">Mesa 4 · 4 productos · IVA incluido</p>

  <div class="total-display">
    <span class="total-display__label">Total a cobrar</span>
    <span class="total-display__value">€19,40</span>
  </div>

  <h4>Método de pago</h4>
  <div class="ux-pay-methods">
    <button class="ux-pay-method" aria-pressed="true">
      <div class="ux-pay-method__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      </div>
      <div>
        <div class="ux-pay-method__name">Tarjeta</div>
        <div class="ux-pay-method__sub">Visa · MC · Amex</div>
      </div>
    </button>
    <button class="ux-pay-method">
      <div class="ux-pay-method__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1l3 5 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1z"/></svg>
      </div>
      <div>
        <div class="ux-pay-method__name">Efectivo</div>
        <div class="ux-pay-method__sub">Cambio automático</div>
      </div>
    </button>
    <button class="ux-pay-method">
      <div class="ux-pay-method__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/></svg>
      </div>
      <div>
        <div class="ux-pay-method__name">Bizum / móvil</div>
        <div class="ux-pay-method__sub">QR contactless</div>
      </div>
    </button>
    <button class="ux-pay-method">
      <div class="ux-pay-method__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 4h4v4M10 20H6v-4M21 3l-7 7M3 21l7-7"/></svg>
      </div>
      <div>
        <div class="ux-pay-method__name">Mixto</div>
        <div class="ux-pay-method__sub">2+ métodos</div>
      </div>
    </button>
  </div>

  <div style="margin-top:14px;display:flex;gap:8px">
    <button class="ux-btn ux-btn--ghost ux-flex-1">Cancelar</button>
    <button class="ux-cart__cta" style="flex:2">
      <span>Confirmar pago</span>
      <span class="ux-cart__cta-amount">€19,40 →</span>
    </button>
  </div>
</div>

</body></html>
