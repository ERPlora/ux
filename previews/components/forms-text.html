<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Forms · Inputs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  h4 { font-family: var(--ux-font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin: 0 0 10px; }
  section { margin-bottom: 22px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
</style></head><body>

<section>
  <h4>Inputs (text · email · password · number)</h4>
  <div class="grid">
    <div class="ux-field">
      <label class="ux-field__label">Nombre comercial</label>
      <input class="ux-input" placeholder="Cafetería La Plaza"/>
    </div>
    <div class="ux-field">
      <label class="ux-field__label ux-field__label--req">Email</label>
      <input class="ux-input" type="email" value="contacto@laplaza.es"/>
    </div>
    <div class="ux-field">
      <label class="ux-field__label">CIF</label>
      <input class="ux-input ux-input--invalid" value="X-1234"/>
      <span class="ux-field__error">Formato no válido (ej. B12345678).</span>
    </div>
    <div class="ux-field">
      <label class="ux-field__label">Plantilla deshabilitada</label>
      <input class="ux-input" disabled value="No editable"/>
    </div>
  </div>
</section>

<section>
  <h4>Tamaños</h4>
  <div class="grid">
    <div class="ux-field">
      <label class="ux-field__label">Compact (sm)</label>
      <input class="ux-input ux-input--sm" placeholder="30px de alto"/>
    </div>
    <div class="ux-field">
      <label class="ux-field__label">Default (36px)</label>
      <input class="ux-input" placeholder="por defecto"/>
    </div>
    <div class="ux-field">
      <label class="ux-field__label">Large (lg)</label>
      <input class="ux-input ux-input--lg" placeholder="44px — formularios marketing"/>
    </div>
  </div>
</section>

<section>
  <h4>Input group · adornos</h4>
  <div class="grid">
    <div class="ux-input-group ux-input-group--with-left">
      <svg class="ux-input-group__icon ux-input-group__icon--left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <input class="ux-input" placeholder="+34 600 00 00 00"/>
    </div>
    <div class="ux-input-group">
      <span class="ux-input-group__addon">€</span>
      <input class="ux-input" placeholder="0,00"/>
    </div>
    <div class="ux-input-group ux-input-group--with-right">
      <input class="ux-input" placeholder="contraseña"/>
      <svg class="ux-input-group__icon ux-input-group__icon--right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div class="ux-input-group">
      <input class="ux-input" value="erplora.com/empresa"/>
      <span class="ux-input-group__addon">.es</span>
    </div>
  </div>
</section>

<section>
  <h4>Search</h4>
  <div class="grid">
    <div class="ux-search">
      <svg class="ux-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input class="ux-input" placeholder="Buscar productos, clientes, pedidos…"/>
      <kbd class="ux-search__kbd">⌘K</kbd>
    </div>
    <div class="ux-search">
      <svg class="ux-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input class="ux-input" value="café"/>
      <button class="ux-search__clear" aria-label="Limpiar">✕</button>
    </div>
  </div>
</section>

<section>
  <h4>Textarea</h4>
  <div class="ux-field">
    <label class="ux-field__label">Notas internas</label>
    <textarea class="ux-textarea" placeholder="Detalles del cliente, preferencias, alergias…"></textarea>
    <span class="ux-field__hint">Solo visible para el equipo. Hasta 500 caracteres.</span>
  </div>
</section>

</body></html>
