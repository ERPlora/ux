<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tabs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@main/bundles/datastar.js"></script>
<style>
  body { padding: 24px; background: var(--ux-bg); }
  .panel {
    margin-top: 14px; padding: 16px;
    background: var(--ux-bg); border: 1px solid var(--ux-line);
    border-radius: 10px; font-size: 13px; color: var(--ux-ink-2);
  }
</style>
</head><body>

<div class="ux-grid-auto ux-grid-auto--lg">

  <div class="ux-demo" data-signals="{tab: 'resumen'}">
    <div class="ux-demo__hd"><span>Default — underline</span><code>.ux-tabs</code></div>
    <div class="ux-demo__bd">
      <div class="ux-tabs" role="tablist">
        <button class="ux-tab" data-on:click="$tab = 'resumen'" data-attr:aria-selected="$tab === 'resumen'">Resumen</button>
        <button class="ux-tab" data-on:click="$tab = 'movimientos'" data-attr:aria-selected="$tab === 'movimientos'">Movimientos <span class="ux-tab-badge">128</span></button>
        <button class="ux-tab" data-on:click="$tab = 'conciliacion'" data-attr:aria-selected="$tab === 'conciliacion'">Conciliación <span class="ux-tab-badge">3</span></button>
        <button class="ux-tab" data-on:click="$tab = 'auditoria'" data-attr:aria-selected="$tab === 'auditoria'">Auditoría</button>
        <button class="ux-tab" data-on:click="$tab = 'configuracion'" data-attr:aria-selected="$tab === 'configuracion'">Configuración</button>
      </div>
      <div class="panel">Contenido del tab activo. La línea inferior indica el seleccionado.</div>
    </div>
  </div>

  <div class="ux-demo" data-signals="{tab: 'vista'}">
    <div class="ux-demo__hd"><span>Con iconos</span><code>.ux-tab + .ux-tab-icon</code></div>
    <div class="ux-demo__bd">
      <div class="ux-tabs" role="tablist">
        <button class="ux-tab" data-on:click="$tab = 'vista'" data-attr:aria-selected="$tab === 'vista'">
          <svg class="ux-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          Vista general
        </button>
        <button class="ux-tab" data-on:click="$tab = 'metricas'" data-attr:aria-selected="$tab === 'metricas'">
          <svg class="ux-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
          Métricas
        </button>
        <button class="ux-tab" data-on:click="$tab = 'equipo'" data-attr:aria-selected="$tab === 'equipo'">
          <svg class="ux-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/></svg>
          Equipo
        </button>
        <button class="ux-tab" data-on:click="$tab = 'ajustes'" data-attr:aria-selected="$tab === 'ajustes'">
          <svg class="ux-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12c0 1-1 1-1 2s1 1 1 2-1 1-1 2"/></svg>
          Ajustes
        </button>
      </div>
      <div class="panel">Tabs con icono + label.</div>
    </div>
  </div>

  <div class="ux-demo">
    <div class="ux-demo__hd"><span>Pill / Segmented</span><code>.ux-tabs--pill</code></div>
    <div class="ux-demo__bd">
      <div data-signals="{tab: 'hoy'}">
        <div class="ux-tabs ux-tabs--pill" role="tablist">
          <button class="ux-tab" data-on:click="$tab = 'hoy'" data-attr:aria-selected="$tab === 'hoy'">Hoy</button>
          <button class="ux-tab" data-on:click="$tab = '7d'" data-attr:aria-selected="$tab === '7d'">7 días</button>
          <button class="ux-tab" data-on:click="$tab = '30d'" data-attr:aria-selected="$tab === '30d'">30 días</button>
          <button class="ux-tab" data-on:click="$tab = 'ano'" data-attr:aria-selected="$tab === 'ano'">Año</button>
        </div>
      </div>
      <div style="height:8px;"></div>
      <div data-signals="{tab: 'tabla'}">
        <div class="ux-tabs ux-tabs--pill" role="tablist">
          <button class="ux-tab" data-on:click="$tab = 'tabla'" data-attr:aria-selected="$tab === 'tabla'">Tabla</button>
          <button class="ux-tab" data-on:click="$tab = 'kanban'" data-attr:aria-selected="$tab === 'kanban'">Kanban</button>
          <button class="ux-tab" data-on:click="$tab = 'calendario'" data-attr:aria-selected="$tab === 'calendario'">Calendario</button>
        </div>
      </div>
    </div>
  </div>

  <div class="ux-demo" data-signals="{tab: 'general'}">
    <div class="ux-demo__hd"><span>Vertical — settings sidebar</span><code>.ux-tabs--vertical</code></div>
    <div class="ux-demo__bd">
      <div style="display:grid;grid-template-columns:200px 1fr;gap:0;">
        <div class="ux-tabs ux-tabs--vertical" role="tablist" style="height:auto;">
          <button class="ux-tab" data-on:click="$tab = 'general'" data-attr:aria-selected="$tab === 'general'">General</button>
          <button class="ux-tab" data-on:click="$tab = 'facturacion'" data-attr:aria-selected="$tab === 'facturacion'">Facturación <span class="ux-tab-badge">3</span></button>
          <button class="ux-tab" data-on:click="$tab = 'equipo'" data-attr:aria-selected="$tab === 'equipo'">Equipo</button>
          <button class="ux-tab" data-on:click="$tab = 'integraciones'" data-attr:aria-selected="$tab === 'integraciones'">Integraciones</button>
          <button class="ux-tab" data-on:click="$tab = 'seguridad'" data-attr:aria-selected="$tab === 'seguridad'">Seguridad</button>
          <button class="ux-tab" data-on:click="$tab = 'api'" data-attr:aria-selected="$tab === 'api'">API y webhooks</button>
          <button class="ux-tab" data-on:click="$tab = 'auditoria'" data-attr:aria-selected="$tab === 'auditoria'">Auditoría</button>
        </div>
        <div class="panel" style="margin:0 0 0 18px;">Panel de configuración general.</div>
      </div>
    </div>
  </div>

</div>

</body></html>
