<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KPI Card</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  h4 { font-family: var(--ux-font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin: 0 0 10px; }

</style></head><body>

<h4>KPI cards</h4>
<div class="ux-grid-auto ux-grid-auto--xs">
  <div class="ux-kpi">
    <div class="ux-kpi__label">
      <svg class="ux-kpi__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M5 9l7-7 7 7"/></svg>
      Ventas hoy
    </div>
    <div class="ux-kpi__value">€2.847<span class="ux-kpi__value-unit">,30</span></div>
    <div class="ux-kpi__delta ux-kpi__delta--up">
      <svg class="ux-kpi__delta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M7 17L17 7M9 7h8v8"/></svg>
      +12,4% vs ayer
    </div>
    <svg class="ux-kpi__sparkline" viewBox="0 0 80 32" preserveAspectRatio="none">
      <polyline points="0,24 10,20 20,22 30,16 40,18 50,12 60,14 70,8 80,6" fill="none" stroke="currentColor" stroke-width="1.5" class="ux-c-leaf"/>
    </svg>
  </div>

  <div class="ux-kpi">
    <div class="ux-kpi__label">Tickets</div>
    <div class="ux-kpi__value">147</div>
    <div class="ux-kpi__delta ux-kpi__delta--up">
      <svg class="ux-kpi__delta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M7 17L17 7M9 7h8v8"/></svg>
      +8 vs media
    </div>
  </div>

  <div class="ux-kpi">
    <div class="ux-kpi__label">Ticket medio</div>
    <div class="ux-kpi__value">€19<span class="ux-kpi__value-unit">,37</span></div>
    <div class="ux-kpi__delta ux-kpi__delta--down">
      <svg class="ux-kpi__delta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M7 7l10 10M17 9v8H9"/></svg>
      −2,1%
    </div>
  </div>

  <div class="ux-kpi ux-kpi--brand">
    <div class="ux-kpi__label">Margen</div>
    <div class="ux-kpi__value">68<span class="ux-kpi__value-unit">%</span></div>
    <div class="ux-kpi__delta">objetivo 70%</div>
  </div>
</div>

</body></html>
