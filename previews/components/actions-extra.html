<!-- ============================================================
     3 · Calculator (Datastar reactive)
     ============================================================ -->
<div class="ux-demo">
  <div class="ux-demo__hd">Calculadora · Datastar reactivo</div>

  <div class="ux-calc"
       data-signals="{display: '0', prev: '', op: '', stored: 0, justEvaluated: false}">

    <div class="ux-calc__display">
      <div class="ux-calc__display-prev" data-text="$prev"></div>
      <div class="ux-calc__display-value" data-text="$display"></div>
    </div>

    <div class="ux-calc__keys">
      <!-- Row 1 -->
      <button class="ux-calc__key ux-calc__key--fn ux-calc__key--wide" type="button"
              data-on:click="$display='0'; $prev=''; $op=''; $stored=0; $justEvaluated=false">
        AC
      </button>
      <button class="ux-calc__key ux-calc__key--fn" type="button"
              data-on:click="$display = ($display.length > 1 ? $display.slice(0, -1) : '0')">
        ⌫
      </button>
      <button class="ux-calc__key ux-calc__key--op" type="button"
              data-class:is-active="$op === '/'"
              data-on:click="$stored = parseFloat($display); $op='/'; $prev = $display + ' ÷'; $display='0'; $justEvaluated=false">
        ÷
      </button>

      <!-- Row 2 -->
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '7' : $display + '7'); $justEvaluated=false">7</button>
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '8' : $display + '8'); $justEvaluated=false">8</button>
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '9' : $display + '9'); $justEvaluated=false">9</button>
      <button class="ux-calc__key ux-calc__key--op" type="button"
              data-class:is-active="$op === '*'"
              data-on:click="$stored = parseFloat($display); $op='*'; $prev = $display + ' ×'; $display='0'; $justEvaluated=false">
        ×
      </button>

      <!-- Row 3 -->
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '4' : $display + '4'); $justEvaluated=false">4</button>
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '5' : $display + '5'); $justEvaluated=false">5</button>
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '6' : $display + '6'); $justEvaluated=false">6</button>
      <button class="ux-calc__key ux-calc__key--op" type="button"
              data-class:is-active="$op === '-'"
              data-on:click="$stored = parseFloat($display); $op='-'; $prev = $display + ' −'; $display='0'; $justEvaluated=false">
        −
      </button>

      <!-- Row 4 -->
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '1' : $display + '1'); $justEvaluated=false">1</button>
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '2' : $display + '2'); $justEvaluated=false">2</button>
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display === '0' || $justEvaluated ? '3' : $display + '3'); $justEvaluated=false">3</button>
      <button class="ux-calc__key ux-calc__key--op" type="button"
              data-class:is-active="$op === '+'"
              data-on:click="$stored = parseFloat($display); $op='+'; $prev = $display + ' +'; $display='0'; $justEvaluated=false">
        +
      </button>

      <!-- Row 5 -->
      <button class="ux-calc__key ux-calc__key--wide" type="button"
              data-on:click="$display = ($justEvaluated ? '0' : $display + '0'); $justEvaluated=false">
        0
      </button>
      <button class="ux-calc__key" type="button"
              data-on:click="$display = ($display.includes('.') ? $display : $display + '.'); $justEvaluated=false">
        .
      </button>
      <button class="ux-calc__key ux-calc__key--equals" type="button"
              data-on:click="
                let b = parseFloat($display);
                let r = $stored;
                if ($op === '+') r = $stored + b;
                else if ($op === '-') r = $stored - b;
                else if ($op === '*') r = $stored * b;
                else if ($op === '/') r = (b === 0 ? 0 : $stored / b);
                else r = b;
                let opSym = $op === '*' ? '×' : ($op === '/' ? '÷' : ($op === '-' ? '−' : $op));
                $prev = ($op ? $stored + ' ' + opSym + ' ' + b + ' =' : '');
                $display = String(Number.isFinite(r) ? +r.toFixed(8) : 0);
                $op = '';
                $stored = 0;
                $justEvaluated = true;
              ">
        =
      </button>
    </div>
  </div>
</div>
