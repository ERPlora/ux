<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Topbar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/erplora-ux.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ERPlora/ux@main/dist/templates/all.min.css"/>
</head><body style="background:var(--ux-bg);min-height:100vh;">

<header class="ux-topbar">
        <div class="ux-topbar__left">
          <button class="ux-topbar__back-btn" aria-label="Volver"
            data-on-click="history.length > 1 ? history.back() : null">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
        </div>
        <h1 class="ux-topbar__page-title">Página</h1>
        
        <div class="ux-topbar__search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input placeholder="Buscar tickets, productos…"/>
    <span class="ux-topbar__kbd">⌘K</span>
  </div>
        
        <div class="ux-topbar__actions">
          <button class="ux-icon-btn" aria-label="Notificaciones"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
    <span class="ux-pill ux-pill--ok"><span class="ux-pill__dot"></span>En línea</span>
    <span class="ux-avatar ux-avatar--sm ux-avatar--brand">JC</span>
        </div>
        <button class="ux-topbar__menu-btn" aria-label="Menú"
            data-on-click="$sidebar = !$sidebar"
            data-attr-aria-expanded="$sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
      </header>

<div style="padding:24px;">
  <div style="background:var(--ux-bg-2);border:1px solid var(--ux-line);border-radius:14px;padding:18px;max-width:640px;">
    <h2 style="font-family:var(--ux-font-display);font-size:18px;font-weight:600;letter-spacing:-0.03em;margin-bottom:6px;">Topbar</h2>
    <p style="font-size:13px;color:var(--ux-ink-3);line-height:1.55;">Barra superior <em>sticky</em> con backdrop blur. Contiene breadcrumb, búsqueda global con atajo de teclado, y acciones rápidas (notificaciones, avatar). En móvil el campo de búsqueda se oculta.</p>
  </div>
</div>

</body></html>
