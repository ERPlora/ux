<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Badge</title>
<link rel="stylesheet" href="../lib/css/ux.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  h4 { font-family: var(--ux-font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin-bottom: 10px; }
  .grp { background: var(--ux-bg-2); border: 1px solid var(--ux-line); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
</style></head><body>

<section class="grp">
  <h4>Badge tonal</h4>
  <div class="row">
    <span class="ux-badge">Default</span>
    <span class="ux-badge ux-badge--brand"><span class="ux-badge__dot"></span>Brand</span>
    <span class="ux-badge ux-badge--ok"><span class="ux-badge__dot"></span>Activo</span>
    <span class="ux-badge ux-badge--warn"><span class="ux-badge__dot"></span>Pendiente</span>
    <span class="ux-badge ux-badge--danger"><span class="ux-badge__dot"></span>Error</span>
    <span class="ux-badge ux-badge--info"><span class="ux-badge__dot"></span>Info</span>
  </div>
</section>

<section class="grp">
  <h4>Badge solid</h4>
  <div class="row">
    <span class="ux-badge ux-badge--solid">12</span>
    <span class="ux-badge ux-badge--solid-brand">NUEVO</span>
    <span class="ux-badge ux-badge--sm">3</span>
  </div>
</section>

<section class="grp">
  <h4>Pill (status)</h4>
  <div class="row">
    <span class="ux-pill ux-pill--ok"><span class="ux-pill__dot"></span>En línea</span>
    <span class="ux-pill ux-pill--warn"><span class="ux-pill__dot"></span>Sincronizando</span>
    <span class="ux-pill ux-pill--danger"><span class="ux-pill__dot"></span>Desconectado</span>
    <span class="ux-pill ux-pill--brand"><span class="ux-pill__dot"></span>Producción</span>
    <span class="ux-pill ux-pill--info"><span class="ux-pill__dot"></span>Sandbox</span>
  </div>
</section>

<section class="grp">
  <h4>Chip · seleccionable y removible</h4>
  <div class="row">
    <button class="ux-chip" data-active="true">Bebidas</button>
    <button class="ux-chip">Café</button>
    <button class="ux-chip">Bocadillos</button>
    <button class="ux-chip">Postres</button>
    <span class="ux-chip">Filtro · Hoy <span class="ux-chip__remove">✕</span></span>
  </div>
</section>

</body></html>
