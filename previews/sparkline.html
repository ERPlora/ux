<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sparkline</title>
<link rel="stylesheet" href="../lib/css/ux.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  h4 { font-family: var(--ux-font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin: 0 0 10px; }
  section { margin-bottom: 22px; }
  .row { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; padding: 14px; background: var(--ux-bg-2); border: 1px solid var(--ux-line); border-radius: 12px; }
  .item { display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
  .lbl { font-size: 11px; color: var(--ux-ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
  .val { font-family: var(--ux-font-display); font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
</style></head><body>

<section>
  <h4>Sparkline · línea</h4>
  <div class="row">
    <div class="item">
      <span class="lbl">Default</span>
      <svg class="ux-spark" viewBox="0 0 80 22" preserveAspectRatio="none">
        <polyline points="0,18 10,15 20,16 30,12 40,14 50,10 60,11 70,7 80,9"/>
      </svg>
    </div>
    <div class="item">
      <span class="lbl">Up</span>
      <svg class="ux-spark ux-spark--up" viewBox="0 0 80 22" preserveAspectRatio="none">
        <polyline points="0,18 10,16 20,14 30,12 40,10 50,9 60,7 70,5 80,3"/>
      </svg>
    </div>
    <div class="item">
      <span class="lbl">Down</span>
      <svg class="ux-spark ux-spark--down" viewBox="0 0 80 22" preserveAspectRatio="none">
        <polyline points="0,4 10,6 20,5 30,9 40,11 50,14 60,15 70,18 80,19"/>
      </svg>
    </div>
    <div class="item">
      <span class="lbl">Brand · large</span>
      <svg class="ux-spark ux-spark--lg ux-spark--brand" viewBox="0 0 120 32" preserveAspectRatio="none">
        <polyline points="0,28 12,24 24,26 36,20 48,22 60,16 72,18 84,12 96,14 108,8 120,4"/>
      </svg>
    </div>
  </div>
</section>

<section>
  <h4>Sparkline · barras</h4>
  <div class="row">
    <div class="item">
      <span class="lbl">Default</span>
      <span class="ux-spark-bars">
        <span class="ux-spark-bars__bar" style="height:40%"></span>
        <span class="ux-spark-bars__bar" style="height:60%"></span>
        <span class="ux-spark-bars__bar" style="height:50%"></span>
        <span class="ux-spark-bars__bar" style="height:80%"></span>
        <span class="ux-spark-bars__bar" style="height:65%"></span>
        <span class="ux-spark-bars__bar" style="height:95%"></span>
      </span>
    </div>
    <div class="item">
      <span class="lbl">Brand</span>
      <span class="ux-spark-bars ux-spark-bars--brand">
        <span class="ux-spark-bars__bar" style="height:40%"></span>
        <span class="ux-spark-bars__bar" style="height:60%"></span>
        <span class="ux-spark-bars__bar" style="height:50%"></span>
        <span class="ux-spark-bars__bar" style="height:80%"></span>
        <span class="ux-spark-bars__bar" style="height:65%"></span>
        <span class="ux-spark-bars__bar" style="height:95%"></span>
      </span>
    </div>
    <div class="item">
      <span class="lbl">Up · más bandas</span>
      <span class="ux-spark-bars ux-spark-bars--up">
        <span class="ux-spark-bars__bar" style="height:20%"></span>
        <span class="ux-spark-bars__bar" style="height:35%"></span>
        <span class="ux-spark-bars__bar" style="height:42%"></span>
        <span class="ux-spark-bars__bar" style="height:55%"></span>
        <span class="ux-spark-bars__bar" style="height:60%"></span>
        <span class="ux-spark-bars__bar" style="height:72%"></span>
        <span class="ux-spark-bars__bar" style="height:85%"></span>
        <span class="ux-spark-bars__bar" style="height:95%"></span>
      </span>
    </div>
  </div>
</section>

<section>
  <h4>Sparkline integrado · KPI</h4>
  <div class="row" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;background:transparent;border:none;padding:0">
    <div class="ux-kpi">
      <div class="ux-kpi__label">Ventas 7d</div>
      <div class="ux-kpi__value">€18.420</div>
      <div class="ux-kpi__delta ux-kpi__delta--up">+12,4%</div>
      <svg class="ux-kpi__sparkline" viewBox="0 0 80 32" preserveAspectRatio="none" style="opacity:0.7">
        <polyline points="0,28 10,24 20,26 30,18 40,20 50,12 60,14 70,8 80,4" fill="none" stroke="var(--ux-leaf)" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="ux-kpi">
      <div class="ux-kpi__label">Tickets/h</div>
      <div class="ux-kpi__value">42</div>
      <div class="ux-kpi__delta">media: 38</div>
      <svg class="ux-kpi__sparkline" viewBox="0 0 80 32" preserveAspectRatio="none" style="opacity:0.7">
        <polyline points="0,18 10,14 20,20 30,12 40,16 50,8 60,12 70,6 80,10" fill="none" stroke="var(--ux-brand)" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="ux-kpi">
      <div class="ux-kpi__label">Devoluciones</div>
      <div class="ux-kpi__value">3<span class="ux-kpi__value-unit">/día</span></div>
      <div class="ux-kpi__delta ux-kpi__delta--down">−1,2%</div>
      <svg class="ux-kpi__sparkline" viewBox="0 0 80 32" preserveAspectRatio="none" style="opacity:0.7">
        <polyline points="0,8 10,12 20,10 30,16 40,18 50,22 60,20 70,26 80,28" fill="none" stroke="var(--ux-danger)" stroke-width="1.5"/>
      </svg>
    </div>
  </div>
</section>

</body></html>
