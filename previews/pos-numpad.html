<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>POS · Numpad</title>
<link rel="stylesheet" href="../lib/css/ux.css"/>
<link rel="stylesheet" href="../lib/templates/all.css"/>
<style>
  body { padding: 22px; background: var(--ux-bg); }
  h4 { font-family: var(--ux-font-display); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ux-ink-3); margin: 0 0 10px; }
  .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px; max-width: 720px; }
  @media (max-width:700px) { .row { grid-template-columns: 1fr; } }
</style></head><body>

<h4>Numpad · cobro de efectivo</h4>
<div class="row">
  <div>
    <div class="ux-numpad-display">
      <div class="ux-numpad-display__label">A cobrar · €19,40</div>
      <div class="ux-numpad-display__value">€20,00</div>
    </div>
    <div class="ux-numpad">
      <button class="ux-numpad__btn">1</button>
      <button class="ux-numpad__btn">2</button>
      <button class="ux-numpad__btn">3</button>
      <button class="ux-numpad__btn">4</button>
      <button class="ux-numpad__btn">5</button>
      <button class="ux-numpad__btn">6</button>
      <button class="ux-numpad__btn">7</button>
      <button class="ux-numpad__btn">8</button>
      <button class="ux-numpad__btn">9</button>
      <button class="ux-numpad__btn ux-numpad__btn--ghost">,</button>
      <button class="ux-numpad__btn">0</button>
      <button class="ux-numpad__btn ux-numpad__btn--ghost">⌫</button>
    </div>
  </div>

  <div>
    <div class="ux-numpad-display">
      <div class="ux-numpad-display__label">Importe</div>
      <div class="ux-numpad-display__value">12<span style="color:var(--ux-ink-3)">,</span>50</div>
    </div>
    <div class="ux-numpad">
      <button class="ux-numpad__btn">7</button>
      <button class="ux-numpad__btn">8</button>
      <button class="ux-numpad__btn">9</button>
      <button class="ux-numpad__btn">4</button>
      <button class="ux-numpad__btn">5</button>
      <button class="ux-numpad__btn">6</button>
      <button class="ux-numpad__btn">1</button>
      <button class="ux-numpad__btn">2</button>
      <button class="ux-numpad__btn">3</button>
      <button class="ux-numpad__btn ux-numpad__btn--double">0</button>
      <button class="ux-numpad__btn ux-numpad__btn--ghost">,</button>
    </div>
    <button class="ux-cart__cta" style="margin-top:12px">
      <span>Confirmar</span>
      <span class="ux-cart__cta-amount">€12,50 →</span>
    </button>
  </div>
</div>

</body></html>
