<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tabs</title>
<link rel="stylesheet" href="../lib/css/ux.css"/>
<style>
  body { padding: 24px; background: var(--ux-bg); }
  .demo-grid { display: grid; gap: 22px; }
  .demo {
    background: var(--ux-bg-2);
    border: 1px solid var(--ux-line);
    border-radius: 14px; overflow: hidden;
  }
  .demo__hd {
    padding: 12px 18px; border-bottom: 1px solid var(--ux-line);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--ux-ink-3);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .demo__hd code {
    font-family: var(--ux-font-mono); font-size: 11.5px;
    color: var(--ux-ink-2); text-transform: none; letter-spacing: 0;
    padding: 2px 7px; background: var(--ux-bg-3); border-radius: 4px;
  }
  .demo__bd { padding: 18px; }
  .panel {
    margin-top: 14px; padding: 16px;
    background: var(--ux-bg); border: 1px solid var(--ux-line);
    border-radius: 10px; font-size: 13px; color: var(--ux-ink-2);
  }
</style>
</head><body>

<div class="demo-grid">

  <div class="demo">
    <div class="demo__hd"><span>Default — underline</span><code>.ux-tabs</code></div>
    <div class="demo__bd">
      <div class="ux-tabs" role="tablist">
        <button class="ux-tab" aria-selected="true">Resumen</button>
        <button class="ux-tab">Movimientos <span class="ux-tab-badge">128</span></button>
        <button class="ux-tab">Conciliación <span class="ux-tab-badge">3</span></button>
        <button class="ux-tab">Auditoría</button>
        <button class="ux-tab">Configuración</button>
      </div>
      <div class="panel">Contenido del tab activo. La línea inferior indica el seleccionado.</div>
    </div>
  </div>

  <div class="demo">
    <div class="demo__hd"><span>Con iconos</span><code>.ux-tab + .ux-tab-icon</code></div>
    <div class="demo__bd">
      <div class="ux-tabs" role="tablist">
        <button class="ux-tab" aria-selected="true">
          <svg class="ux-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          Vista general
        </button>
        <button class="ux-tab">
          <svg class="ux-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
          Métricas
        </button>
        <button class="ux-tab">
          <svg class="ux-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/></svg>
          Equipo
        </button>
        <button class="ux-tab">
          <svg class="ux-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12c0 1-1 1-1 2s1 1 1 2-1 1-1 2"/></svg>
          Ajustes
        </button>
      </div>
      <div class="panel">Tabs con icono + label.</div>
    </div>
  </div>

  <div class="demo">
    <div class="demo__hd"><span>Pill / Segmented</span><code>.ux-tabs--pill</code></div>
    <div class="demo__bd">
      <div class="ux-tabs ux-tabs--pill" role="tablist">
        <button class="ux-tab" aria-selected="true">Hoy</button>
        <button class="ux-tab">7 días</button>
        <button class="ux-tab">30 días</button>
        <button class="ux-tab">Año</button>
      </div>
      <div style="height:8px;"></div>
      <div class="ux-tabs ux-tabs--pill" role="tablist">
        <button class="ux-tab" aria-selected="true">Tabla</button>
        <button class="ux-tab">Kanban</button>
        <button class="ux-tab">Calendario</button>
      </div>
    </div>
  </div>

  <div class="demo">
    <div class="demo__hd"><span>Vertical — settings sidebar</span><code>.ux-tabs--vertical</code></div>
    <div class="demo__bd">
      <div style="display:grid;grid-template-columns:200px 1fr;gap:0;">
        <div class="ux-tabs ux-tabs--vertical" role="tablist" style="height:auto;">
          <button class="ux-tab" aria-selected="true">General</button>
          <button class="ux-tab">Facturación <span class="ux-tab-badge">3</span></button>
          <button class="ux-tab">Equipo</button>
          <button class="ux-tab">Integraciones</button>
          <button class="ux-tab">Seguridad</button>
          <button class="ux-tab">API y webhooks</button>
          <button class="ux-tab">Auditoría</button>
        </div>
        <div class="panel" style="margin:0 0 0 18px;">Panel de configuración general.</div>
      </div>
    </div>
  </div>

</div>

<script>
  document.querySelectorAll('.ux-tabs').forEach(bar => {
    bar.addEventListener('click', e => {
      const t = e.target.closest('.ux-tab'); if (!t) return;
      bar.querySelectorAll('.ux-tab').forEach(i => i.setAttribute('aria-selected', 'false'));
      t.setAttribute('aria-selected', 'true');
    });
  });
</script>

</body></html>
