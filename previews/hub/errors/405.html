<!doctype html>
<html lang="es" data-theme="erplora">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>405 · Método no permitido · ERPlora Hub</title>
<link rel="stylesheet" href="../../../lib/css/ux.css"/>
<link rel="stylesheet" href="../../../lib/templates/all.css"/>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@main/bundles/datastar.js"></script>
<style>
  body { background: var(--ux-bg); margin: 0; }

  /* TODO UX: ux-error-page composite — same note */
  .err-page {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: var(--ux-space-5);
    position: relative;
    overflow: hidden;
  }
  .err-page::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 70% 10%, color-mix(in oklch, var(--ux-warn) 12%, transparent) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 20% 90%, color-mix(in oklch, var(--ux-brand) 8%, transparent) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .err-page::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(color-mix(in oklch, var(--ux-ink) 4%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in oklch, var(--ux-ink) 4%, transparent) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none; z-index: 0;
  }
  .err-card {
    position: relative; z-index: 1;
    max-width: 520px; width: 100%;
    text-align: center;
  }
  .err-illu {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: color-mix(in oklch, var(--ux-warn) 14%, var(--ux-bg-2));
    color: var(--ux-warn);
    display: grid; place-items: center;
    margin: 0 auto var(--ux-space-4);
  }
  .err-code {
    font-family: var(--ux-font-display);
    font-size: clamp(72px, 14vw, 120px);
    font-weight: 800;
    color: var(--ux-warn);
    line-height: 1;
    letter-spacing: var(--ux-tracking-tighter);
    margin: 0 0 var(--ux-space-3);
  }
  .err-title {
    font-family: var(--ux-font-display);
    font-size: var(--ux-text-2xl);
    font-weight: 700;
    color: var(--ux-ink);
    margin: 0 0 var(--ux-space-2);
    letter-spacing: var(--ux-tracking-tight);
  }
  .err-msg {
    color: var(--ux-ink-2);
    line-height: var(--ux-leading-relaxed);
    margin: 0 0 var(--ux-space-5);
  }
  .err-actions {
    display: inline-flex; gap: var(--ux-space-2); flex-wrap: wrap;
    justify-content: center;
  }
  .err-meta {
    margin-top: var(--ux-space-5);
    font-family: var(--ux-font-mono);
    font-size: 11px;
    color: var(--ux-ink-3);
  }
  .err-allowed {
    display: inline-flex; gap: 4px;
    margin-top: var(--ux-space-3);
    padding: 6px 10px;
    border-radius: var(--ux-radius-md);
    background: var(--ux-bg-2);
    border: 1px solid var(--ux-line);
    font-family: var(--ux-font-mono);
    font-size: 11px;
    color: var(--ux-ink-3);
  }
  .err-allowed b { color: var(--ux-leaf); }
</style>
</head>
<body>
  <main class="err-page">
    <div class="err-card">
      <div class="err-illu" aria-hidden="true">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M4.93 4.93l14.14 14.14"/>
        </svg>
      </div>
      <h1 class="err-code">405</h1>
      <h2 class="err-title">Método no permitido</h2>
      <p class="err-msg">
        El método HTTP utilizado no está permitido para este recurso. Vuelve a la
        página anterior y prueba de nuevo desde la interfaz.
      </p>
      <div class="err-allowed">
        Permitido: <b>GET</b> · <b>HEAD</b>
      </div>

      <div class="err-actions" style="margin-top:var(--ux-space-5)">
        <a href="/" class="ux-btn ux-btn--primary">Volver al inicio</a>
        <button class="ux-btn ux-btn--ghost"
                data-on-click="window.history.back()">
          Página anterior
        </button>
      </div>

      <div class="err-meta">err.http.405 · método=POST · req-7e2c91a</div>
    </div>
  </main>
</body>
</html>
