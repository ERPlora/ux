<!doctype html>
<html lang="es" data-theme="erplora">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 · Página no encontrada · ERPlora Hub</title>
<link rel="stylesheet" href="../../../lib/css/ux.css"/>
<link rel="stylesheet" href="../../../lib/templates/all.css"/>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@main/bundles/datastar.js"></script>
<style>
  body { background: var(--ux-bg); margin: 0; }

  /* TODO UX: same composite ux-error-page note as 403.html */
  .err-page {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: var(--ux-space-5);
    position: relative;
    overflow: hidden;
  }
  .err-page::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 70% 10%, color-mix(in oklch, var(--ux-info) 14%, transparent) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 20% 90%, color-mix(in oklch, var(--ux-brand) 10%, transparent) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .err-page::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(color-mix(in oklch, var(--ux-ink) 4%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in oklch, var(--ux-ink) 4%, transparent) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none; z-index: 0;
  }
  .err-card {
    position: relative; z-index: 1;
    max-width: 580px; width: 100%;
    text-align: center;
  }
  .err-illu {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: color-mix(in oklch, var(--ux-info) 12%, var(--ux-bg-2));
    color: var(--ux-info);
    display: grid; place-items: center;
    margin: 0 auto var(--ux-space-4);
  }
  .err-code {
    font-family: var(--ux-font-display);
    font-size: clamp(72px, 14vw, 120px);
    font-weight: 800;
    color: var(--ux-info);
    line-height: 1;
    letter-spacing: var(--ux-tracking-tighter);
    margin: 0 0 var(--ux-space-3);
  }
  .err-title {
    font-family: var(--ux-font-display);
    font-size: var(--ux-text-2xl);
    font-weight: 700;
    color: var(--ux-ink);
    margin: 0 0 var(--ux-space-2);
    letter-spacing: var(--ux-tracking-tight);
  }
  .err-msg {
    color: var(--ux-ink-2);
    line-height: var(--ux-leading-relaxed);
    margin: 0 0 var(--ux-space-5);
  }
  .err-search { max-width: 380px; margin: 0 auto var(--ux-space-5); }

  .err-quick {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: var(--ux-space-2);
    max-width: 480px; margin: 0 auto;
  }
  .err-quick a {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    border-radius: var(--ux-radius-md);
    background: var(--ux-bg-2);
    border: 1px solid var(--ux-line);
    color: var(--ux-ink);
    text-decoration: none;
    font-size: var(--ux-text-sm);
    transition: border-color var(--ux-dur-fast), background var(--ux-dur-fast);
  }
  .err-quick a:hover {
    border-color: var(--ux-line-2);
    background: var(--ux-bg-3);
  }
  .err-quick svg { color: var(--ux-ink-3); flex-shrink: 0; }

  .err-meta {
    margin-top: var(--ux-space-5);
    font-family: var(--ux-font-mono);
    font-size: 11px;
    color: var(--ux-ink-3);
  }
</style>
</head>
<body>
  <main class="err-page">
    <div class="err-card">
      <div class="err-illu" aria-hidden="true">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4.3-4.3"/>
        </svg>
      </div>
      <h1 class="err-code">404</h1>
      <h2 class="err-title">Página no encontrada</h2>
      <p class="err-msg">
        La página que buscas no existe o ha sido movida. Comprueba la URL o
        prueba con la búsqueda.
      </p>

      <div class="err-search">
        <div class="ux-search">
          <span class="ux-search__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
            </svg>
          </span>
          <input class="ux-input" type="search" placeholder="Buscar en el hub…"/>
        </div>
      </div>

      <div class="err-quick">
        <a href="/dashboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9"/>
            <rect x="14" y="3" width="7" height="5"/>
            <rect x="14" y="12" width="7" height="9"/>
            <rect x="3" y="16" width="7" height="5"/>
          </svg>
          Dashboard
        </a>
        <a href="/sales">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/>
          </svg>
          Ventas
        </a>
        <a href="/inventory">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
          Inventario
        </a>
        <a href="/marketplace">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l1.5-4.5h15L21 9"/>
            <path d="M3 9v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/>
          </svg>
          Marketplace
        </a>
      </div>

      <div class="err-actions" style="margin-top:var(--ux-space-5); display:flex; gap:var(--ux-space-2); justify-content:center; flex-wrap:wrap">
        <a href="/" class="ux-btn ux-btn--primary">Volver al inicio</a>
        <button class="ux-btn ux-btn--ghost"
                data-on-click="window.history.back()">
          Página anterior
        </button>
      </div>

      <div class="err-meta">err.http.404 · req-3a8f02d</div>
    </div>
  </main>
</body>
</html>
