<!doctype html><html lang="es" data-theme="erplora"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>POS · Layout completo</title>
<link rel="stylesheet" href="../lib/css/ux.css"/>
<style>
  body { padding: 14px; background: var(--ux-bg); height: 100vh; box-sizing: border-box; }
  .ux-pos { height: calc(100vh - 28px); }
</style></head><body>

<div class="ux-pos" id="pos">
  <div class="ux-pos__backdrop" onclick="document.getElementById('pos').dataset.cartOpen='false'"></div>

  <!-- Catálogo -->
  <section class="ux-pos__main">
    <div class="ux-cat-rail">
      <button class="ux-cat-rail__arrow ux-cat-rail__arrow--prev" aria-label="Anterior" onclick="this.nextElementSibling.scrollBy({left:-300,behavior:'smooth'})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="ux-cat-rail__track">
        <button class="ux-cat-card ux-cat-card--all" aria-pressed="true">
          <span class="ux-cat-card__bg"></span>
          <span class="ux-cat-card__name">Todos</span>
          <span class="ux-cat-card__count">142 productos</span>
        </button>
        <button class="ux-cat-card ux-cat-card--coffee">
          <span class="ux-cat-card__bg" style="background-image:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&q=70')"></span>
          <span class="ux-cat-card__name">Cafés</span>
          <span class="ux-cat-card__count">18 productos</span>
        </button>
        <button class="ux-cat-card ux-cat-card--tea">
          <span class="ux-cat-card__bg" style="background-image:url('https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=400&q=70')"></span>
          <span class="ux-cat-card__name">Tés</span>
          <span class="ux-cat-card__count">12 productos</span>
        </button>
        <button class="ux-cat-card ux-cat-card--bakery">
          <span class="ux-cat-card__bg" style="background-image:url('https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=400&q=70')"></span>
          <span class="ux-cat-card__name">Bocadillos</span>
          <span class="ux-cat-card__count">24 productos</span>
        </button>
        <button class="ux-cat-card ux-cat-card--snacks">
          <span class="ux-cat-card__bg" style="background-image:url('https://images.unsplash.com/photo-1525351484163-7529414344d8?w=400&q=70')"></span>
          <span class="ux-cat-card__name">Tostadas</span>
          <span class="ux-cat-card__count">8 productos</span>
        </button>
        <button class="ux-cat-card ux-cat-card--dessert">
          <span class="ux-cat-card__bg" style="background-image:url('https://images.unsplash.com/photo-1551024601-bec78aea704b?w=400&q=70')"></span>
          <span class="ux-cat-card__name">Postres</span>
          <span class="ux-cat-card__count">14 productos</span>
        </button>
        <button class="ux-cat-card ux-cat-card--cold">
          <span class="ux-cat-card__bg" style="background-image:url('https://images.unsplash.com/photo-1437418747212-8d9709afab22?w=400&q=70')"></span>
          <span class="ux-cat-card__name">Bebidas</span>
          <span class="ux-cat-card__count">22 productos</span>
        </button>
        <button class="ux-cat-card ux-cat-card--menu">
          <span class="ux-cat-card__bg" style="background-image:url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&q=70')"></span>
          <span class="ux-cat-card__name">Menús</span>
          <span class="ux-cat-card__count">6 combos</span>
        </button>
        <button class="ux-cat-card" style="background:#3a2a1a">
          <span class="ux-cat-card__bg" style="background:linear-gradient(135deg,#a85a3a,#3a1f10)"></span>
          <span class="ux-cat-card__name">Combos</span>
          <span class="ux-cat-card__count">9 ofertas</span>
        </button>
        <button class="ux-cat-card" style="background:#1a3a3a">
          <span class="ux-cat-card__bg" style="background:linear-gradient(135deg,#3aa89e,#1a4a4a)"></span>
          <span class="ux-cat-card__name">Veggie</span>
          <span class="ux-cat-card__count">11 productos</span>
        </button>
      </div>
      <button class="ux-cat-rail__arrow ux-cat-rail__arrow--next" aria-label="Siguiente" onclick="this.previousElementSibling.scrollBy({left:300,behavior:'smooth'})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="ux-cat-scroll">
      <div class="ux-cat-grid">
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Café espresso</span>
        <span class="ux-cat-tile__price">€1,40</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1497636577773-f1231844b336?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Café cortado</span>
        <span class="ux-cat-tile__price">€1,60</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Café con leche</span>
        <span class="ux-cat-tile__price">€1,80</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Cappuccino doble</span>
        <span class="ux-cat-tile__price">€2,40</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1536256263959-770b48d82b0a?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Té matcha</span>
        <span class="ux-cat-tile__price">€2,80</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1597481499750-3e6b22637e12?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Té verde menta</span>
        <span class="ux-cat-tile__price">€2,20</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1525351484163-7529414344d8?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Tostada con tomate</span>
        <span class="ux-cat-tile__price">€3,50</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Tostada salmón</span>
        <span class="ux-cat-tile__price">€5,90</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1509722747041-616f39b57569?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Bocadillo serrano</span>
        <span class="ux-cat-tile__price">€4,80</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Croissant chocolate</span>
        <span class="ux-cat-tile__price">€2,40</span>
      </button>
      <button class="ux-cat-tile ux-cat-tile--out">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Tarta queso</span>
        <span class="ux-cat-tile__price">€4,20</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Zumo natural</span>
        <span class="ux-cat-tile__price">€3,50</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Menú del día</span>
        <span class="ux-cat-tile__price">€14,00</span>
      </button>
      <button class="ux-cat-tile">
        <span class="ux-cat-tile__img" style="background-image:url('https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?w=300&q=70')"></span>
        <span class="ux-cat-tile__name">Combo desayuno</span>
        <span class="ux-cat-tile__price">€5,20</span>
      </button>
    </div>
    </div>
  </section>

  <!-- Carrito -->
  <aside class="ux-pos__aside">
    <div class="ux-cart">
      <header class="ux-cart__header">
        <div>
          <div class="ux-cart__title">Mesa 4 · Ana</div>
          <div class="ux-cart__sub">Pedido en curso · 3 líneas</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="ux-btn ux-btn--ghost ux-btn--icon" aria-label="Más">⋯</button>
          <button class="ux-pos__cart-close" onclick="document.getElementById('pos').dataset.cartOpen='false'" aria-label="Cerrar carrito">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </header>

      <div class="ux-cart__list">
        <div class="ux-cart__line ux-cart__line--selected">
          <div>
            <div class="ux-cart__line-name"><span class="ux-cart__line-qty">2</span>Café cortado</div>
            <div class="ux-cart__line-meta">leche desnatada · sin azúcar</div>
          </div>
          <div class="ux-cart__line-price">€3,20</div>
        </div>
        <div class="ux-cart__line">
          <div>
            <div class="ux-cart__line-name"><span class="ux-cart__line-qty">1</span>Tostada salmón</div>
            <div class="ux-cart__line-meta">extra aguacate</div>
          </div>
          <div class="ux-cart__line-price">€6,40</div>
        </div>
        <div class="ux-cart__line">
          <div>
            <div class="ux-cart__line-name"><span class="ux-cart__line-qty">1</span>Zumo natural</div>
            <div class="ux-cart__line-meta">naranja · grande <span style="color:var(--ux-leaf)"> · −10%</span></div>
          </div>
          <div class="ux-cart__line-price">
            <div class="ux-cart__line-orig">€4,00</div>
            €3,60
          </div>
        </div>
        <div class="ux-cart__line">
          <div>
            <div class="ux-cart__line-name"><span class="ux-cart__line-qty">2</span>Croissant chocolate</div>
          </div>
          <div class="ux-cart__line-price">€4,80</div>
        </div>
      </div>

      <div class="ux-cart__totals">
        <div class="ux-cart__total-row"><span>Subtotal</span><span>€18,00</span></div>
        <div class="ux-cart__total-row"><span>Descuento</span><span style="color:var(--ux-leaf)">−€0,40</span></div>
        <div class="ux-cart__total-row"><span>IVA 10%</span><span>€1,76</span></div>
        <div class="ux-cart__total-row ux-cart__total-row--main">
          <span>Total</span><span>€19,40</span>
        </div>
      </div>

      <div class="ux-cart__actions">
        <div style="display:flex;gap:8px">
          <button class="ux-btn ux-btn--ghost" style="flex:1">Aparcar</button>
          <button class="ux-btn ux-btn--secondary" style="flex:1">Descuento</button>
        </div>
        <button class="ux-cart__cta">
          <span>Cobrar</span>
          <span class="ux-cart__cta-amount">€19,40 →</span>
        </button>
      </div>
    </div>
  </aside>

  <button class="ux-pos__cart-fab" onclick="document.getElementById('pos').dataset.cartOpen='true'" aria-label="Abrir carrito">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1.5"/><circle cx="20" cy="21" r="1.5"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
    <span class="ux-pos__cart-fab__badge" data-fab-badge>4</span>
  </button>

</div>

<script>
(() => {
  const pos = document.getElementById('pos');
  const cartList = pos.querySelector('.ux-cart__list');
  const fabBadge = pos.querySelector('[data-fab-badge]');
  const cartSub = pos.querySelector('.ux-cart__sub');
  const subtotalEl = pos.querySelectorAll('.ux-cart__total-row')[0]?.querySelector('span:last-child');
  const totalMainEl = pos.querySelector('.ux-cart__total-row--main span:last-child');
  const ctaAmount = pos.querySelector('.ux-cart__cta-amount');
  const fab = pos.querySelector('.ux-pos__cart-fab');

  // ---------- Filtrado por categoría ----------
  pos.querySelectorAll('.ux-cat-card').forEach(card => {
    card.addEventListener('click', () => {
      pos.querySelectorAll('.ux-cat-card').forEach(c => c.setAttribute('aria-pressed', 'false'));
      card.setAttribute('aria-pressed', 'true');
    });
  });

  // ---------- Hover spotlight effect ----------
  pos.querySelectorAll('.ux-cat-tile').forEach(tile => {
    tile.addEventListener('pointermove', (e) => {
      const r = tile.getBoundingClientRect();
      tile.style.setProperty('--mx', `${e.clientX - r.left}px`);
      tile.style.setProperty('--my', `${e.clientY - r.top}px`);
    });
  });

  // ---------- Estado del carrito ----------
  // Empezamos con las 3 líneas pre-cargadas en el DOM (Café cortado x2, Tostada salmón x1, Zumo x1)
  let lineCount = 4; // suma de qty
  let subtotal = 18.00;

  function updateTotals() {
    const discount = 0.40;
    const taxableBase = subtotal - discount;
    const tax = +(taxableBase * 0.10).toFixed(2);
    const total = +(taxableBase + tax).toFixed(2);
    if (subtotalEl) subtotalEl.textContent = `€${subtotal.toFixed(2).replace('.', ',')}`;
    pos.querySelectorAll('.ux-cart__total-row')[2]?.querySelector('span:last-child')
      ?.replaceChildren(document.createTextNode(`€${tax.toFixed(2).replace('.', ',')}`));
    if (totalMainEl) totalMainEl.textContent = `€${total.toFixed(2).replace('.', ',')}`;
    if (ctaAmount) ctaAmount.textContent = `€${total.toFixed(2).replace('.', ',')} →`;
    if (fabBadge) fabBadge.textContent = String(lineCount);
    if (cartSub) {
      const lines = cartList.querySelectorAll('.ux-cart__line').length;
      cartSub.textContent = `Pedido en curso · ${lines} línea${lines === 1 ? '' : 's'}`;
    }
  }

  function bump(el) {
    if (!el) return;
    el.classList.remove('ux-bump');
    void el.offsetWidth;
    el.classList.add('ux-bump');
  }

  function flyToCart(tile) {
    const img = tile.querySelector('.ux-cat-tile__img');
    if (!img) return;
    const target = window.matchMedia('(max-width: 900px)').matches ? fab : pos.querySelector('.ux-cart__cta');
    if (!target) return;
    const startRect = img.getBoundingClientRect();
    const endRect = target.getBoundingClientRect();
    const fly = document.createElement('div');
    fly.className = 'ux-fly';
    fly.style.left = startRect.left + 'px';
    fly.style.top = startRect.top + 'px';
    fly.style.width = startRect.width + 'px';
    fly.style.height = startRect.height + 'px';
    fly.style.backgroundImage = img.style.backgroundImage;
    document.body.appendChild(fly);
    requestAnimationFrame(() => {
      const dx = endRect.left + endRect.width/2 - (startRect.left + startRect.width/2);
      const dy = endRect.top  + endRect.height/2 - (startRect.top + startRect.height/2);
      fly.style.transform = `translate(${dx}px, ${dy}px) scale(0.18) rotate(120deg)`;
      fly.style.opacity = '0.4';
      fly.style.width = '20px';
      fly.style.height = '20px';
    });
    setTimeout(() => fly.remove(), 720);
  }

  function priceToNum(s) { return parseFloat(s.replace('€','').replace(',','.')) || 0; }

  function addProduct(tile) {
    if (tile.classList.contains('ux-cat-tile--out')) return;
    const name  = tile.querySelector('.ux-cat-tile__name')?.textContent.trim() || 'Producto';
    const price = priceToNum(tile.querySelector('.ux-cat-tile__price')?.textContent || '0');

    // Pulse en el tile
    tile.classList.remove('ux-cat-tile--pulse');
    void tile.offsetWidth;
    tile.classList.add('ux-cat-tile--pulse');

    flyToCart(tile);

    // Si ya existe línea con ese nombre, incrementar qty
    const existing = [...cartList.querySelectorAll('.ux-cart__line')].find(l =>
      l.querySelector('.ux-cart__line-name')?.textContent.trim().endsWith(name)
    );
    setTimeout(() => {
      if (existing) {
        const qtyEl = existing.querySelector('.ux-cart__line-qty');
        const priceEl = existing.querySelector('.ux-cart__line-price');
        const qty = parseInt(qtyEl.textContent, 10) + 1;
        qtyEl.textContent = qty;
        const lineTotal = qty * price;
        priceEl.textContent = `€${lineTotal.toFixed(2).replace('.', ',')}`;
        bump(qtyEl);
      } else {
        const line = document.createElement('div');
        line.className = 'ux-cart__line ux-cart__line--enter';
        line.innerHTML = `
          <div>
            <div class="ux-cart__line-name"><span class="ux-cart__line-qty">1</span>${name}</div>
            <div class="ux-cart__line-meta">añadido ahora</div>
          </div>
          <div class="ux-cart__line-price">€${price.toFixed(2).replace('.', ',')}</div>`;
        cartList.appendChild(line);
        // scroll al fondo
        cartList.scrollTo({ top: cartList.scrollHeight, behavior: 'smooth' });
      }
      lineCount += 1;
      subtotal = +(subtotal + price).toFixed(2);
      updateTotals();
      bump(fabBadge);
    }, 380);
  }

  pos.querySelectorAll('.ux-cat-tile').forEach(tile => {
    tile.addEventListener('click', () => addProduct(tile));
  });

  // Selección de línea del carrito
  cartList.addEventListener('click', (e) => {
    const line = e.target.closest('.ux-cart__line');
    if (!line) return;
    cartList.querySelectorAll('.ux-cart__line').forEach(l => l.classList.remove('ux-cart__line--selected'));
    line.classList.add('ux-cart__line--selected');
  });
})();
</script>

</body></html>
